name: Deploy HTML to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: aht-admin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 222
          debug: true
          script: |
            cd /var/www/myapp

            # clone lần đầu nếu chưa có
            if [ ! -d ".git" ]; then
              git clone https://github.com/justxoai/CodeGym_Git-HTML.git .
            fi

            git pull origin main
